apiVersion: v1
kind: Namespace
metadata:
  name: wslc

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: wslc
data:
  GENERIC_TIMEZONE: "America/Sao_Paulo"
  TZ: "America/Sao_Paulo"
  N8N_HOST: "hermes.ecomciencia.com"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "https"
  N8N_WEBHOOK_URL: "https://hermes.ecomciencia.com/"
  N8N_SECURE_COOKIE: "true"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data
  namespace: wslc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: wslc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: ghcr.io/robsonrbranco/hermes:latest
          ports:
            - containerPort: 5678
          envFrom:
            - configMapRef:
                name: hermes-config
            - secretRef:
                name: hermes-secrets
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data

---
apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: wslc
spec:
  selector:
    app: hermes
  ports:
    - port: 5678
      targetPort: 5678

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes
  namespace: wslc
spec:
  rules:
    - host: hermes.ecomciencia.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes
                port:
                  number: 5678
